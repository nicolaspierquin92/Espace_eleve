<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Élèves — Fiches de Séance</title>
<style>
  :root{
    --bg1:#12141a;
    --bg2:#1a1d26;
    --accent:#5b7fff;
    --accent2:#a0aec0;
    --card:#181b23;
    --text:#f1f3f6;
    --muted:#8a90a0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 60%,#0b1120);
    color:var(--text);
    min-height:100vh;
  }
  .contact-bar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#12141aee;
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid rgba(91,127,255,.15);
    padding:14px 20px;
    box-shadow:0 4px 20px rgba(0,0,0,.35);
  }
  .contact-inner{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .contact-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:var(--text);
    font-size:.85rem;
    font-weight:600;
    padding:8px 16px;
    border-radius:999px;
    background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(129,140,248,.12));
    border:1px solid rgba(56,189,248,.25);
    transition:all .25s ease;
    white-space:nowrap;
  }
  .contact-pill em{
    font-style:normal;
    color:var(--muted);
    font-weight:400;
  }
  .contact-pill:hover{
    transform:translateY(-2px);
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#0b1120;
    box-shadow:0 6px 18px rgba(56,189,248,.35);
    border-color:transparent;
  }
  .contact-pill:hover em{
    color:#0b1120;
  }
  .pill-icon{
    font-size:1rem;
  }
  @media (max-width:480px){
    .pill-text{ font-size:.8rem; }
    .contact-pill{ padding:7px 12px; }
  }
  header{
    padding:56px 24px 24px;
    text-align:center;
    position:relative;
    z-index:1;
  }
  header h1{
    font-size:2.2rem;
    margin:0 0 8px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:800;
  }
  header p{
    color:var(--muted);
    margin:0;
    font-size:1rem;
  }
  #status{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:24px;
  }
  .container{
    max-width:1100px;
    margin:0 auto;
    padding:0 24px 60px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:22px;
  }
  .card{
    background:var(--card);
    border:1px solid rgba(148,163,184,.15);
    border-radius:18px;
    padding:22px;
    position:relative;
    overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease;
    animation:fadeIn .5s ease both;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-40px;
    right:-40px;
    width:120px;
    height:120px;
    background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
    opacity:.12;
    border-radius:50%;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 32px rgba(91,127,255,.12);
    border-color:rgba(91,127,255,.35);
  }
  .seance-tag{
    display:inline-block;
    font-size:.75rem;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--accent);
    background:rgba(56,189,248,.1);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .card h2{
    font-size:1.25rem;
    margin:0 0 18px;
    color:var(--text);
  }
  .btn-row{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    padding:11px 16px;
    border-radius:10px;
    font-weight:600;
    font-size:.92rem;
    transition:opacity .2s, transform .2s;
  }
  .btn:hover{ transform:scale(1.02); opacity:.92; }
  .btn-primary{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#0b1120;
  }
  .btn-secondary{
    background:rgba(148,163,184,.12);
    color:var(--text);
    border:1px solid rgba(148,163,184,.25);
  }
  .btn.disabled{
    opacity:.35;
    pointer-events:none;
    background:rgba(148,163,184,.08);
    color:var(--muted);
  }
  .media-block{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(148,163,184,.15);
  }
  .media-label{
    display:block;
    font-size:.8rem;
    color:var(--muted);
    margin-bottom:8px;
    font-weight:600;
  }
  audio, video{
    width:100%;
    border-radius:8px;
    outline:none;
  }
  video{
    max-height:180px;
    background:#000;
  }
  .video-wrapper{
    position:relative;
    width:100%;
    padding-top:56.25%;
    border-radius:10px;
    overflow:hidden;
    background:#000;
  }
  .video-wrapper iframe{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    border:0;
  }
  .drive-audio-wrapper{
    border-radius:8px;
    overflow:hidden;
  }
  .drive-audio-wrapper iframe{
    width:100%;
    height:70px;
    border:0;
  }
  .custom-audio{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(91,127,255,.06);
    border:1px solid rgba(91,127,255,.15);
    border-radius:12px;
    padding:10px 14px;
  }
  .play-btn{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,var(--accent),#7c93ff);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s;
  }
  .play-btn:hover{
    transform:scale(1.08);
  }
  .play-btn svg{
    width:18px;
    height:18px;
    fill:#fff;
  }
  .audio-progress-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .audio-seek{
    width:100%;
    height:4px;
    -webkit-appearance:none;
    appearance:none;
    background:rgba(255,255,255,.15);
    border-radius:999px;
    outline:none;
    cursor:pointer;
  }
  .audio-seek::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
    cursor:pointer;
    box-shadow:0 0 0 3px rgba(91,127,255,.2);
  }
  .audio-seek::-moz-range-thumb{
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
    border:none;
    cursor:pointer;
  }
  .audio-time{
    font-size:.72rem;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
  }
  .empty{
    text-align:center;
    color:var(--muted);
    padding:60px 0;
    font-size:1rem;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  footer{
    text-align:center;
    color:var(--muted);
    font-size:.8rem;
    padding:20px;
  }
</style>
</head>
<body>

<div class="contact-bar">
  <div class="contact-inner">
    <a class="contact-pill" href="mailto:Nicolaspierquin92@gmail.com">
      <span class="pill-icon">✉️</span>
      <span class="pill-text">Nicolaspierquin92@gmail.com</span>
    </a>
    <a class="contact-pill" href="sms:+33649409226">
      <span class="pill-icon">📱</span>
      <span class="pill-text">06 49 40 92 26 <em>(SMS)</em></span>
    </a>
  </div>
</div>

<header>
  <h1>📚 Espace Élèves</h1>
  <p>Retrouvez toutes vos fiches d'exercices et corrigés par séance</p>
</header>

<div id="status">Chargement des séances…</div>

<div class="container">
  <div id="grid" class="grid"></div>
</div>

<footer>Mis à jour automatiquement depuis Google Sheets</footer>

<script>
// ==== CONFIGURATION ====
const SHEET_ID = "14OqJSc8UVnypn3SZaepQ0LSZF5lG3rU6BCMyKJFyMV4";
const GID = "0";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}&headers=1`;
const REFRESH_INTERVAL_MS = 60000; // rafraîchit toutes les 60s

async function loadSheetData(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
    const rows = json.table.rows;

    const seances = rows.map(r => {
      const cells = r.c;
      const get = (i) => cells[i] && cells[i].v ? String(cells[i].v).trim() : "";
      return {
        seance: get(0),
        exercice: get(1),
        corrige: get(2),
        audio: get(3),
        video: get(4)
      };
    }).filter(s => s.seance !== "" && s.seance.toLowerCase() !== "séance" && s.seance.toLowerCase() !== "seance");

    renderCards(seances);
    initCustomAudioPlayers();
    document.getElementById('status').textContent =
      `Dernière mise à jour : ${new Date().toLocaleTimeString('fr-FR')} — ${seances.length} séance(s) disponible(s)`;
  }catch(err){
    document.getElementById('status').textContent = "Erreur de chargement des données. Vérifiez le partage du Google Sheet.";
    console.error(err);
  }
}

function renderCards(seances){
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  if(seances.length === 0){
    grid.innerHTML = `<div class="empty">Aucune séance disponible pour le moment.</div>`;
    return;
  }

  seances.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${idx * 0.05}s`;

    const exerciceBtn = s.exercice
      ? `<a class="btn btn-primary" href="${s.exercice}" target="_blank" rel="noopener">📄 Feuille d'exercices</a>`
      : `<span class="btn btn-primary disabled">📄 Feuille d'exercices</span>`;

    const corrigeBtn = s.corrige
      ? `<a class="btn btn-secondary" href="${s.corrige}" target="_blank" rel="noopener">✅ Corrigé</a>`
      : `<span class="btn btn-secondary disabled">✅ Corrigé (à venir)</span>`;

function getDriveId(url){
      const m = url.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]{20,})/);
      return m ? m[1] : null;
    }

    function getYoutubeEmbed(url){
      const m = url.match(/(?:youtu\.be\/|v=|shorts\/|embed\/)([A-Za-z0-9_-]{11})/);
      return m ? `https://www.youtube.com/embed/${m[1]}` : null;
    }

    function getVimeoEmbed(url){
      const m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
      return m ? `https://player.vimeo.com/video/${m[1]}` : null;
    }

    function getLoomEmbed(url){
      const m = url.match(/loom\.com\/(?:share|embed)\/([a-zA-Z0-9]+)/);
      return m ? `https://www.loom.com/embed/${m[1]}` : null;
    }

    function isDirectFile(url){
      return /\.(mp4|webm|ogg|mp3|wav|m4a)(\?.*)?$/i.test(url);
    }

    function buildMediaEmbed(url){
      const yt = getYoutubeEmbed(url);
      if(yt) return {type:'iframe', src:yt};
      const vimeo = getVimeoEmbed(url);
      if(vimeo) return {type:'iframe', src:vimeo};
      const loom = getLoomEmbed(url);
      if(loom) return {type:'iframe', src:loom};
      const driveId = getDriveId(url);
      if(driveId) return {type:'iframe', src:`https://drive.google.com/file/d/${driveId}/preview`};
      if(isDirectFile(url)) return {type:'file', src:url};
      return {type:'iframe', src:url};
    }

    let audioBlock = "";
    let audioSrcForPlayer = "";
    if(s.audio){
      const driveId = getDriveId(s.audio);
      if(driveId){
        audioSrcForPlayer = `https://drive.google.com/uc?export=download&id=${driveId}`;
      } else if(isDirectFile(s.audio)){
        audioSrcForPlayer = s.audio;
      }

      if(audioSrcForPlayer){
        const playerId = `audio-${idx}`;
        audioBlock = `<div class="media-block">
           <span class="media-label">🎧 Dictée</span>
           <div class="custom-audio" id="${playerId}">
             <button class="play-btn" aria-label="Lecture">
               <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
               <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
             </button>
             <div class="audio-progress-wrap">
               <input type="range" class="audio-seek" value="0" min="0" max="100" step="0.1">
               <div class="audio-time"><span class="time-current">0:00</span> / <span class="time-total">0:00</span></div>
             </div>
             <audio preload="metadata" src="${audioSrcForPlayer}"></audio>
           </div>
         </div>`;
      } else {
        const media = buildMediaEmbed(s.audio);
        audioBlock = `<div class="media-block">
           <span class="media-label">🎧 Dictée</span>
           <div class="drive-audio-wrapper"><iframe src="${media.src}" allow="autoplay" loading="lazy"></iframe></div>
         </div>`;
      }
    }

    let videoBlock = "";
    if(s.video){
      const media = buildMediaEmbed(s.video);
      if(media.type === 'file'){
        videoBlock = `<div class="media-block">
           <span class="media-label">🎬 Corrections en vidéo</span>
           <video controls preload="none" src="${media.src}"></video>
         </div>`;
      } else {
        videoBlock = `<div class="media-block">
           <span class="media-label">🎬 Corrections en vidéo</span>
           <div class="video-wrapper"><iframe src="${media.src}" allowfullscreen loading="lazy"></iframe></div>
         </div>`;
      }
    }

    card.innerHTML = `
      <span class="seance-tag">Séance</span>
      <h2>${s.seance}</h2>
      <div class="btn-row">
        ${exerciceBtn}
        ${corrigeBtn}
      </div>
      ${audioBlock}
      ${videoBlock}
    `;
    grid.appendChild(card);
  });
}

function initCustomAudioPlayers(){
  document.querySelectorAll('.custom-audio').forEach(el => {
    const audio = el.querySelector('audio');
    const btn = el.querySelector('.play-btn');
    const iconPlay = el.querySelector('.icon-play');
    const iconPause = el.querySelector('.icon-pause');
    const seek = el.querySelector('.audio-seek');
    const timeCurrent = el.querySelector('.time-current');
    const timeTotal = el.querySelector('.time-total');

    function formatTime(t){
      if(!isFinite(t)) return "0:00";
      const m = Math.floor(t/60);
      const s = Math.floor(t%60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = formatTime(audio.duration);
    });

    btn.addEventListener('click', () => {
      if(audio.paused){
        document.querySelectorAll('.custom-audio audio').forEach(a => { if(a !== audio){ a.pause(); } });
        audio.play();
        iconPlay.style.display = 'none';
        iconPause.style.display = '';
      } else {
        audio.pause();
        iconPlay.style.display = '';
        iconPause.style.display = 'none';
      }
    });

    audio.addEventListener('ended', () => {
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      seek.value = 0;
    });

    audio.addEventListener('timeupdate', () => {
      if(audio.duration){
        seek.value = (audio.currentTime / audio.duration) * 100;
        timeCurrent.textContent = formatTime(audio.currentTime);
      }
    });

    seek.addEventListener('input', () => {
      if(audio.duration){
        audio.currentTime = (seek.value / 100) * audio.duration;
      }
    });
  });
}

loadSheetData();
setInterval(loadSheetData, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
